<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-container container">
        <ul class="list">
          <li class="item-m">TOPTAL</li>
        </ul>
        <ul class="list">
          <li class="item">Untitles ></li>
        </ul>
        <ul class="list">
          <li class="item">Keycodes</li>
        </ul>

        <button class="btn">Table</button>
      </div>
    </header>

    <main>
      <section class="intro">
        <h2 class="title">JavaScript KeyCode</h2>

        <h1 class="num"></h1>
      </section>

      <section class="cards">
        <div class="cards-container">
          <div class="card">
            <p class="card-text">event.key</p>
            <p class="key"></p>
          </div>
          <div class="card">
            <p class="card-text">event.location</p>
            <p class="key-loc"></p>
          </div>
          <div class="card">
            <p class="card-text">event.code</p>
            <p class="key-code"></p>
          </div>
        </div>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
